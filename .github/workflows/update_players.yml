name: Refresh Player List

on:
  schedule:
    - cron: '0 6 * * 1'    # Monday    06:00 UTC = 07:00 BST
    - cron: '0 6 * * 3'    # Wednesday 06:00 UTC = 07:00 BST
    - cron: '0 0 * * 0'    # Sunday    00:00 UTC = 01:00 BST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-players:
    name: Refresh player list from Google Sheet
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh players from Google Sheet
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python update_register.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update: player list refreshed from Google Sheet [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No new registrations — index.html unchanged."
